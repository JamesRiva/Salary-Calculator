<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PH Salary Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0f1a;
    --card: #111827;
    --card2: #141d2e;
    --border: #1e2d45;
    --accent: #f5c842;
    --accent2: #e05c3a;
    --blue: #3b82f6;
    --green: #34d399;
    --text: #e8edf5;
    --muted: #6b7a99;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 32px 16px 80px;
    background-image:
      radial-gradient(ellipse 55% 35% at 85% 5%, rgba(59,130,246,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 45% 30% at 5% 95%, rgba(245,200,66,0.06) 0%, transparent 60%);
  }
  .wrapper { max-width: 900px; margin: 0 auto; }

  .flag-bar { display: flex; gap: 5px; margin-bottom: 16px; }
  .flag-seg { height: 4px; border-radius: 2px; flex: 1; }
  .flag-seg.b { background: #0038a8; }
  .flag-seg.r { background: #ce1126; }
  .flag-seg.y { background: #fcd116; }
  h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.8rem; margin-top: 5px; font-family: var(--mono); }

  .layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }

  .sec-label {
    font-size: 0.65rem; font-family: var(--mono); text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .sec-label::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .sec-label.green::before { background: var(--green); }

  .col-headers {
    display: grid; grid-template-columns: 1fr 130px 100px 60px;
    gap: 10px; padding: 0 4px 8px; align-items: center;
  }
  .col-h { font-size: 0.6rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: #2a3a55; text-align: right; }
  .col-h.left { text-align: left; }

  .cat-list { display: flex; flex-direction: column; gap: 8px; }

  .cat-item {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    display: grid; grid-template-columns: 1fr 130px 100px 60px;
    gap: 10px; align-items: center;
    transition: border-color 0.2s;
    animation: fadeIn 0.22s ease;
  }
  .cat-item:hover { border-color: #2a3d5e; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  .cat-name-wrap { display: flex; align-items: center; gap: 8px; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name-text { font-weight: 700; font-size: 0.85rem; }
  .cat-desc { font-size: 0.68rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; padding-left: 16px; }

  .input-wrap { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
  .rate-input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 10px; color: var(--accent); font-family: var(--mono);
    font-size: 0.85rem; width: 90px; outline: none;
    transition: border-color 0.2s; text-align: right;
  }
  .rate-input:focus { border-color: var(--accent); }
  .hours-input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 7px 10px; color: var(--text); font-family: var(--mono);
    font-size: 0.85rem; width: 62px; outline: none;
    transition: border-color 0.2s; text-align: center;
  }
  .hours-input:focus { border-color: var(--blue); }
  .unit { font-size: 0.65rem; color: var(--muted); font-family: var(--mono); white-space: nowrap; }

  .actions-col { display: flex; gap: 4px; justify-content: flex-end; }
  .btn-icon {
    background: none; border: 1px solid transparent; border-radius: 7px;
    cursor: pointer; font-size: 0.82rem; padding: 5px 8px; transition: all 0.18s; line-height: 1;
    color: #2a3a55;
  }
  .btn-icon.edit:hover  { border-color: var(--blue);   color: var(--blue);   background: rgba(59,130,246,0.08); }
  .btn-icon.del:hover   { border-color: var(--accent2); color: var(--accent2); background: rgba(224,92,58,0.08); }

  /* ADD/EDIT FORM */
  .add-form {
    background: var(--card2); border: 1px dashed var(--border);
    border-radius: 12px; padding: 18px; margin-top: 12px; display: none;
  }
  .add-form.open { display: block; animation: fadeIn 0.2s ease; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-label { font-size: 0.62rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; color: var(--text); font-family: var(--mono); font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .color-section { margin-bottom: 12px; }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .color-swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: white; transform: scale(1.15); box-shadow: 0 0 0 2px var(--bg); }
  .form-actions { display: flex; gap: 8px; }
  .btn-save {
    flex: 1; padding: 10px; background: var(--accent); color: #0b0f1a;
    border: none; border-radius: 8px; font-family: var(--font); font-weight: 700;
    font-size: 0.82rem; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel {
    padding: 10px 16px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono);
    font-size: 0.78rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .btn-add {
    width: 100%; margin-top: 12px; padding: 11px;
    background: transparent; border: 1px dashed var(--border); border-radius: 10px;
    color: var(--muted); font-family: var(--mono); font-size: 0.78rem;
    cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* SUMMARY */
  .summary-sticky { position: sticky; top: 20px; }
  .sum-rows { display: flex; flex-direction: column; }
  .sum-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--border); gap: 8px;
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-name-wrap { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; }
  .sum-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sum-meta { font-size: 0.63rem; font-family: var(--mono); color: var(--muted); margin-top: 2px; padding-left: 14px; }
  .sum-amount { font-family: var(--mono); font-size: 0.88rem; font-weight: 500; flex-shrink: 0; }
  .dim { color: #2a3a55 !important; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .total-block { padding: 18px; background: var(--card2); border-radius: 12px; border: 1px solid rgba(245,200,66,0.15); text-align: center; }
  .total-lbl { font-size: 0.62rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 6px; }
  .total-val { font-size: 1.9rem; font-weight: 800; color: var(--accent); letter-spacing: -0.03em; }
  .total-val .sym { font-size: 0.95rem; opacity: 0.6; margin-right: 1px; }
  .total-hrs { font-size: 0.68rem; font-family: var(--mono); color: var(--muted); margin-top: 4px; }

  .empty { text-align: center; padding: 24px 0; color: var(--muted); font-family: var(--mono); font-size: 0.78rem; line-height: 1.8; }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { opacity: 0.4; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="flag-bar">
    <div class="flag-seg b"></div>
    <div class="flag-seg r"></div>
    <div class="flag-seg y"></div>
  </div>
  <h1>Salary <span>Calculator</span></h1>
  <div class="subtitle">// Manage OT categories & set pay per hour — Philippine Peso (₱)</div>

  <div class="layout">

    <!-- LEFT -->
    <div>
      <div class="card">
        <div class="sec-label">OT Pay Categories</div>

        <div class="col-headers">
          <div class="col-h left">Category</div>
          <div class="col-h">Rate / hr</div>
          <div class="col-h">Hours</div>
          <div class="col-h"></div>
        </div>

        <div class="cat-list" id="catList"></div>

        <!-- FORM -->
        <div class="add-form" id="addForm">
          <div class="form-row">
            <div>
              <label class="form-label">Category Name</label>
              <input class="form-input" id="fName" placeholder="e.g. Holiday OT" maxlength="30"/>
            </div>
            <div>
              <label class="form-label">Description (optional)</label>
              <input class="form-input" id="fDesc" placeholder="e.g. Dec 25 extra hours" maxlength="40"/>
            </div>
          </div>
          <div class="color-section">
            <label class="form-label">Label Color</label>
            <div class="color-row" id="colorPicker"></div>
          </div>
          <div class="form-actions">
            <button class="btn-save" id="saveBtn" onclick="saveCategory()">＋ Add Category</button>
            <button class="btn-cancel" onclick="closeForm()">Cancel</button>
          </div>
        </div>

        <button class="btn-add" id="addBtn" onclick="toggleForm()">＋ Add OT Category</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="summary-sticky">
      <div class="card">
        <div class="sec-label green">Pay Summary</div>
        <div class="sum-rows" id="sumRows"></div>
        <div class="divider"></div>
        <div class="total-block">
          <div class="total-lbl">Total Gross Pay</div>
          <div class="total-val"><span class="sym">₱</span><span id="grandTotal">0.00</span></div>
          <div class="total-hrs" id="totalHrs">0 total hours logged</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const PALETTE = ['#f5c842','#3b82f6','#e05c3a','#34d399','#a78bfa','#f472b6','#fb923c','#38bdf8','#4ade80','#e879f9'];

let cats = [
  { id:1, name:'Basic Pay',   desc:'Regular working hours',          color:'#f5c842', rate:0, hours:0 },
  { id:2, name:'Regular OT',  desc:'Beyond 8 hrs on a regular day',  color:'#3b82f6', rate:0, hours:0 },
  { id:3, name:'Rest Day',    desc:'First 8 hrs on rest/Sunday',     color:'#e05c3a', rate:0, hours:0 },
  { id:4, name:'Rest Day OT', desc:'Beyond 8 hrs on a rest day',     color:'#34d399', rate:0, hours:0 },
];
let nextId = 5, selColor = '#a78bfa', formOpen = false, editId = null;

const fmt = n => n.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function renderColorPicker() {
  const el = document.getElementById('colorPicker');
  el.innerHTML = '';
  PALETTE.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-swatch' + (c === selColor ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => { selColor = c; renderColorPicker(); };
    el.appendChild(d);
  });
}

function render() {
  const list = document.getElementById('catList');
  const sumEl = document.getElementById('sumRows');
  list.innerHTML = '';
  sumEl.innerHTML = '';

  if (cats.length === 0) {
    list.innerHTML = `<div class="empty">No categories yet.<br/>Click "＋ Add OT Category" below.</div>`;
    sumEl.innerHTML = `<div class="empty" style="padding:8px 0">No categories.</div>`;
    document.getElementById('grandTotal').textContent = '0.00';
    document.getElementById('totalHrs').textContent = '0 total hours logged';
    return;
  }

  let grand = 0, totalH = 0;

  cats.forEach(cat => {
    const rate = parseFloat(cat.rate) || 0;
    const hrs  = parseFloat(cat.hours) || 0;
    const amt  = rate * hrs;
    grand += amt; totalH += hrs;

    // --- List row ---
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = `
      <div>
        <div class="cat-name-wrap">
          <span class="cat-dot" style="background:${cat.color}"></span>
          <span class="cat-name-text">${esc(cat.name)}</span>
        </div>
        ${cat.desc ? `<div class="cat-desc">${esc(cat.desc)}</div>` : ''}
      </div>
      <div class="input-wrap">
        <span class="unit">₱</span>
        <input class="rate-input" type="number" min="0" step="0.01"
          value="${cat.rate || ''}" placeholder="0.00"
          title="Rate per hour for ${esc(cat.name)}"
          oninput="updateCat(${cat.id},'rate',this.value)" />
      </div>
      <div class="input-wrap">
        <input class="hours-input" type="number" min="0" step="0.5"
          value="${cat.hours || ''}" placeholder="0"
          title="Hours worked"
          oninput="updateCat(${cat.id},'hours',this.value)" />
        <span class="unit">hrs</span>
      </div>
      <div class="actions-col">
        <button class="btn-icon edit" onclick="openEdit(${cat.id})" title="Edit category">✎</button>
        <button class="btn-icon del"  onclick="deleteCat(${cat.id})" title="Delete category">✕</button>
      </div>
    `;
    list.appendChild(item);

    // --- Summary row ---
    const row = document.createElement('div');
    row.className = 'sum-row';
    row.innerHTML = `
      <div>
        <div class="sum-name-wrap">
          <span class="sum-dot" style="background:${cat.color}"></span>
          ${esc(cat.name)}
        </div>
        <div class="sum-meta">${hrs} hr(s) × ₱${fmt(rate)}/hr</div>
      </div>
      <div class="sum-amount ${amt===0?'dim':''}" style="${amt>0?'color:'+cat.color:''}">
        ₱${fmt(amt)}
      </div>
    `;
    sumEl.appendChild(row);
  });

  document.getElementById('grandTotal').textContent = fmt(grand);
  document.getElementById('totalHrs').textContent = totalH + ' total hour' + (totalH !== 1 ? 's' : '') + ' logged';
}

function updateCat(id, field, val) {
  const c = cats.find(x => x.id === id);
  if (c) { c[field] = parseFloat(val) || 0; renderSummaryOnly(); }
}

function renderSummaryOnly() {
  const sumEl = document.getElementById('sumRows');
  sumEl.innerHTML = '';
  let grand = 0, totalH = 0;
  cats.forEach(cat => {
    const rate = parseFloat(cat.rate) || 0;
    const hrs  = parseFloat(cat.hours) || 0;
    const amt  = rate * hrs;
    grand += amt; totalH += hrs;
    const row = document.createElement('div');
    row.className = 'sum-row';
    row.innerHTML = `
      <div>
        <div class="sum-name-wrap">
          <span class="sum-dot" style="background:${cat.color}"></span>
          ${esc(cat.name)}
        </div>
        <div class="sum-meta">${hrs} hr(s) × ₱${fmt(rate)}/hr</div>
      </div>
      <div class="sum-amount ${amt===0?'dim':''}" style="${amt>0?'color:'+cat.color:''}">
        ₱${fmt(amt)}
      </div>
    `;
    sumEl.appendChild(row);
  });
  document.getElementById('grandTotal').textContent = fmt(grand);
  document.getElementById('totalHrs').textContent = totalH + ' total hour' + (totalH !== 1 ? 's' : '') + ' logged';
}

function toggleForm() {
  if (formOpen && editId === null) { closeForm(); return; }
  editId = null; formOpen = true;
  document.getElementById('fName').value = '';
  document.getElementById('fDesc').value = '';
  selColor = '#a78bfa';
  document.getElementById('saveBtn').textContent = '＋ Add Category';
  document.getElementById('addBtn').textContent = '✕ Cancel';
  document.getElementById('addForm').classList.add('open');
  renderColorPicker();
  document.getElementById('fName').focus();
}

function openEdit(id) {
  const c = cats.find(x => x.id === id);
  if (!c) return;
  editId = id; formOpen = true;
  document.getElementById('fName').value = c.name;
  document.getElementById('fDesc').value = c.desc;
  selColor = c.color;
  document.getElementById('saveBtn').textContent = '✔ Save Changes';
  document.getElementById('addBtn').textContent = '✕ Cancel';
  document.getElementById('addForm').classList.add('open');
  renderColorPicker();
  document.getElementById('fName').focus();
  document.getElementById('addForm').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function closeForm() {
  formOpen = false; editId = null;
  document.getElementById('addForm').classList.remove('open');
  document.getElementById('addBtn').textContent = '＋ Add OT Category';
}

function saveCategory() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }
  const desc = document.getElementById('fDesc').value.trim();

  if (editId !== null) {
    const c = cats.find(x => x.id === editId);
    if (c) { c.name = name; c.desc = desc; c.color = selColor; }
  } else {
    cats.push({ id: nextId++, name, desc, color: selColor, rate: 0, hours: 0 });
  }
  closeForm();
  render();
}

function deleteCat(id) {
  cats = cats.filter(x => x.id !== id);
  render();
}

// Boot
renderColorPicker();
render();
</script>
</body>
</html>
